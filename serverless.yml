service: serverless-user-management-api

provider:
  name: aws
  runtime: python3.9
  region: us-east-2

  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
      Resource: "*"

functions:
  createUser:
    handler: handler.create_user
    events:
      - http:
          path: create-user
          method: post
          cors: true
